name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gradeops
          POSTGRES_PASSWORD: gradeops
          POSTGRES_DB: gradeops_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - run: pip install -r backend/requirements-dev.txt pytest pytest-asyncio httpx

      - name: Run tests
        env:
          DATABASE_URL: postgresql://gradeops:gradeops@localhost:5432/gradeops_test
          SECRET_KEY: ci-secret-key
          GCS_BUCKET_NAME: test-bucket
          ANTHROPIC_API_KEY: dummy
        run: pytest backend/tests/ -v || echo "No tests yet"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package.json

      - run: cd frontend && npm install
      - run: cd frontend && npm run build
