version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gradeops
      POSTGRES_PASSWORD: gradeops
      POSTGRES_DB: gradeops
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gradeops"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: python:3.11-slim
    working_dir: /app
    env_file: .env
    environment:
      DATABASE_URL: postgresql://gradeops:gradeops@db:5432/gradeops
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "pip install -r requirements.txt -q &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  pgdata:
